<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery OpenAI API示例</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        textarea, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
            display: block;
            width: 100%;
            margin: 10px 0;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-stream {
            background-color: #2ecc71;
        }
        .btn-stream:hover {
            background-color: #27ae60;
        }
        .response-area {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-height: 100px;
            background-color: #f8f9fa;
        }
        .response-stream {
            white-space: pre-wrap;
            line-height: 1.8;
        }
        .warning {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            border: 1px solid #f5c6cb;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>jQuery OpenAI API 示例</h1>
    
    <div class="warning">
        <strong>安全警告：</strong> 此示例仅用于演示目的。在实际应用中，切勿在前端代码中硬编码API密钥，
        因为这会暴露你的密钥给任何访问你网站的人。生产环境中应通过后端服务器代理API请求。
    </div>
    
    <div class="container">
        <h2>非流式调用</h2>
        <div class="input-group">
            <label for="apiKey">OpenAI API密钥：</label>
            <input type="password" id="apiKey" placeholder="输入你的API密钥">
        </div>
        <div class="input-group">
            <label for="prompt">输入提示：</label>
            <textarea id="prompt" placeholder="输入你的问题或提示...">请用200字左右介绍人工智能的发展历程</textarea>
        </div>
        <button id="btnSubmit">发送请求（非流式）</button>
        <div class="response-area" id="response"></div>
    </div>
    
    <div class="container">
        <h2>流式调用</h2>
        <div class="input-group">
            <label for="promptStream">输入提示：</label>
            <textarea id="promptStream" placeholder="输入你的问题或提示...">请用200字左右介绍机器学习的基本概念</textarea>
        </div>
        <button class="btn-stream" id="btnStream">发送请求（流式）</button>
        <div class="response-area">
            <div class="response-stream" id="responseStream"></div>
        </div>
    </div>
    
    <div class="loader" id="loader"></div>

    <script>
        $(document).ready(function() {
            // 非流式调用
            $("#btnSubmit").click(function() {
                const apiKey = $("#apiKey").val();
                const prompt = $("#prompt").val();
                
                if (!apiKey) {
                    alert("请输入API密钥");
                    return;
                }
                
                if (!prompt) {
                    alert("请输入提示内容");
                    return;
                }
                
                $("#response").html("请求中...");
                $("#loader").show();
                
                // 使用jQuery AJAX调用OpenAI API
                $.ajax({
                    url: "http://192.168.3.25:1234/v1/chat/completions",
                    type: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + apiKey
                    },
                    data: JSON.stringify({
                        model: "qwen/qwen3-30b-a3b-2507",
                        messages: [
                            {role: "system", content: "你是一个有帮助的助手。"},
                            {role: "user", content: prompt}
                        ],
                        max_tokens: 500
                    }),
                    success: function(response) {
                        const content = response.choices[0].message.content;
                        $("#response").html(content);
                        $("#loader").hide();
                    },
                    error: function(xhr) {
                        $("#response").html("错误: " + xhr.responseText);
                        $("#loader").hide();
                    }
                });
            });
            
            // 流式调用
            $("#btnStream").click(function() {
                const apiKey = $("#apiKey").val();
                const prompt = $("#promptStream").val();
                
                if (!apiKey) {
                    alert("请输入API密钥");
                    return;
                }
                
                if (!prompt) {
                    alert("请输入提示内容");
                    return;
                }
                
                $("#responseStream").html("");
                $("#loader").show();
                
                // 使用fetch API进行流式调用（jQuery对流的支持有限）
                fetch("http://192.168.3.25:1234/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + apiKey
                    },
                    body: JSON.stringify({
                        model: "qwen/qwen3-30b-a3b-2507",
                        messages: [
                            {role: "system", content: "你是一个有帮助的助手。"},
                            {role: "user", content: prompt}
                        ],
                        stream: true, // 关键：启用流式传输
                        max_tokens: 500
                    })
                })
                .then(response => {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let buffer = "";
                    
                    function readStream() {
                        reader.read().then(({value, done}) => {
                            if (done) {
                                $("#loader").hide();
                                return;
                            }
                            
                            // 解码并处理数据块
                            const chunk = decoder.decode(value, {stream: true});
                            buffer += chunk;
                            
                            // 处理所有完整的JSON对象
                            let boundary;
                            while ((boundary = buffer.indexOf("\n")) !== -1) {
                                const line = buffer.substring(0, boundary).trim();
                                buffer = buffer.substring(boundary + 1);
                                
                                if (line.startsWith("data: ") && line !== "data: [DONE]") {
                                    try {
                                        const json = JSON.parse(line.substring(6));
                                        const content = json.choices[0].delta.content;
                                        if (content) {
                                            $("#responseStream").append(content);
                                            // 自动滚动到底部
                                            const container = $("#responseStream").parent();
                                            container.scrollTop(container[0].scrollHeight);
                                        }
                                    } catch (e) {
                                        console.error("解析错误:", e, line);
                                    }
                                }
                            }
                            
                            readStream(); // 继续读取下一个数据块
                        })
                        .catch(error => {
                            console.error("流读取错误:", error);
                            $("#loader").hide();
                        });
                    }
                    
                    readStream();
                })
                .catch(error => {
                    console.error("请求错误:", error);
                    $("#responseStream").html("错误: " + error.message);
                    $("#loader").hide();
                });
            });
        });
    </script>
</body>
</html>
