        <!-- 中间聊天区域 -->

            <div class="messages-container">

                            </button> -->

                            </button>

                        </div>

                </div>

        </div>

        <!-- 右侧设置区域 -->
        <div class="settings-panel">
            <div class="settings-header">智能体设置</div>

            <div class="setting-group">
                <label class="setting-label">头像设置</label>

                        <div id="avatar-placeholder" class="avatar-placeholder">

                    <div class="avatar-upload-actions">
                        <input type="file" id="avatar-upload" accept="image/*" style="display: none;">

                    <option value="memoryless">无记忆</option>

            </div>

                </div>
            </div>

            <div class="setting-group">
                <label class="setting-label">频率惩罚</label>

            <div class="setting-group">
                <label class="setting-label">角色名称</label>

                <label class="setting-label">系统提示/职业设定</label>

                <input id="character-setup" class="setting-input-single" placeholder="请输入系统提示/职业设定"
                    value="你是一个有用的AI助手，请用简洁明了的语言回答用户的问题。">
            </div>

                <label class="setting-label">辅助设定</label>

    <script>
        // 当前配置对象
        let currentCharacter = {
            id: '',
            title: '',
            name: '',
            identity: '',
            detailed_setting: '',
            avatar_url: '',
            model: '',
            memory_type: '',
        };

        let currentSession = {
            id: '',
            model: '',
            memory_type: '',
        }

        const sendBtn = document.getElementById('sendButton');
        const stopBtn = document.getElementById('stopButton');
        const messageInput = document.querySelector('.message-input');
        const messagesContainer = document.querySelector('.messages-container');

        // 在脚本中添加这个函数
        function formatMessageContent(content) {
            // 1. 转义特殊字符防止XSS攻击
            let escaped = content
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            // 2. 将换行符转换为<br>标签
            // escaped = escaped
            //    .split(/\n{2,}/)  // 拆分连续换行
            //    .map(paragraph =>
            //         paragraph.trim() ? `<p>${paragraph.replace(/\n/g, "<br>")}</p>` : ""
            //    )
            //   .join("");
            html = marked.parse(escaped).trim();
            //console.log(html);
            return html;

        }

        function getCharacterIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('character');
        }

        function updateURLWithCharacterId(characterId) {
            const url = new URL(window.location);
            url.searchParams.set('character', characterId);
            window.history.replaceState({}, '', url);
        }
        // 添加选择第一个角色的函数
        function selectFirstCharacter() {
            const firstCharacter = document.querySelector('.character-item');
            firstCharacter.click();
        }

        function cleanupMessages() {
            messagesContainer.innerHTML = '';
        }

        function addMessageElement(message) {
            // const messagesContainer = document.querySelector('.messages-container');
            const mssageRole = message.role;
            const text = message.content;
            const reasoningContent = message.reasoning_content || null;
            const sender = mssageRole === 'user' ? 'user' : 'assistant';
            const messageId = message.id || 'tmp-' + sender + '-id';

            // 创建消息容器
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            messageElement.dataset.id = messageId;
            messageElement.dataset.content = text;
            // 添加角色特定的类名
            messageElement.classList.add(sender === 'user' ? 'user-message-container' : 'assistant-message-container');

            // 创建头像
            const avatar = document.createElement('div');
            // avatar.className = `avatar ${sender}-avatar`;
            avatar.className = sender === 'user' ? 'avatar user-avatar' : 'avatar assistant-avatar';
            let avatarIcon;
            if (sender == 'user') {
                avatarIcon = document.createElement('i');
                avatarIcon.className = 'fas fa-user';
            } else {
                if (currentCharacter.avatar_url == '') {
                    avatarIcon = document.createElement('i');
                    avatarIcon.className = 'fas fa-robot';
                } else {
                    avatarIcon = document.createElement('img');
                    avatarIcon.src = currentCharacter.avatar_url;
                }
            }
            avatar.appendChild(avatarIcon);

            // 创建消息内容区域
            const contentElement = document.createElement('div');
            contentElement.className = 'message-content';

            // 创建消息气泡
            const bubble = document.createElement('div');
            bubble.className = 'message-card'; // 修改为卡片式设计

            const thinkingSection = document.createElement('div');
            thinkingSection.className = reasoningContent == null ? 'thinking-section thinking-hide' : 'thinking-section';
            const thinkingHeader = document.createElement('div');
            thinkingHeader.className = 'thinking-header';
            thinkingHeader.innerHTML = '<i class="fas fa-lightbulb"></i><span>已深度思考</span><i class="fas fa-angle-right"></i>';
            thinkingSection.appendChild(thinkingHeader);
            const thinkingContent = document.createElement('div');
            thinkingContent.className = 'thinking-content';
            if (reasoningContent != null) {
                thinkingContent.innerHTML = reasoningContent;
            }
            thinkingSection.appendChild(thinkingContent);
            bubble.appendChild(thinkingSection);
            const toggleReasoningIcon = function () {
                // 获取箭头图标元素
                const arrowIcon = bubble.querySelector('.fa-angle-right, .fa-angle-down');

                // 切换箭头方向
                if (thinkingSection.classList.contains('thinking-expanded')) {
                    arrowIcon.classList.remove('fa-angle-right');
                    arrowIcon.classList.add('fa-angle-down');
                } else {
                    arrowIcon.classList.remove('fa-angle-down');
                    arrowIcon.classList.add('fa-angle-right');
                }
            }
            // 折叠/展开逻辑
            thinkingHeader.addEventListener('click', function () {
                thinkingSection.classList.toggle('thinking-expanded');
                toggleReasoningIcon();
            });


            const textElement = document.createElement('div');
            textElement.className = 'message-text';
            textElement.innerHTML = formatMessageContent(text);
            bubble.appendChild(textElement);

            // 创建加载指示器
            if (sender === 'assistant' && text === '') {
                const loadingElement = document.createElement('div');
                loadingElement.className = 'assistant-loading';
                loadingElement.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 思考中...';
                bubble.appendChild(loadingElement);
            }
            // 添加元数据（仅AI消息）
            // if (sender === 'ai' && meta) {
            //     const metaElement = document.createElement('div');
            //     metaElement.className = 'ai-meta';
            //     metaElement.textContent = meta;
            //     contentElement.appendChild(metaElement);
            // }

            // 创建消息操作按钮
            const actionsElement = document.createElement('div');
            actionsElement.className = 'message-actions';

            const actions = [];
            if (sender === 'user') {
                actions.push({ icon: 'fa-arrow-down', text: '重答', action: 'fetch-response' });
            }
            actions.push(
                { icon: 'fa-trash', text: '删除', action: 'delete' },
                { icon: 'fa-edit', text: '编辑', action: 'edit' },
                { icon: 'fa-copy', text: '复制', action: 'copy' }
            );


            actions.forEach(item => {
                const actionElement = document.createElement('div');
                actionElement.className = 'message-action';
                actionElement.dataset.action = item.action;

                const icon = document.createElement('i');
                icon.className = `fas ${item.icon}`;
                actionElement.appendChild(icon);

                actionElement.appendChild(document.createTextNode(item.text));
                actionsElement.appendChild(actionElement);
            });

            // 组装元素
            contentElement.appendChild(bubble);
            contentElement.appendChild(actionsElement);

            messageElement.appendChild(avatar);
            messageElement.appendChild(contentElement);

            // 添加到容器
            messagesContainer.appendChild(messageElement);

            // 滚动到底部
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            return {

                getMessageElement: () => messageElement,

                updateMessageId: (newId) => {
                    messageElement.dataset.id = newId;
                },
                showReasoning: () => {
                    //const thinkingSection = bubble.querySelector('.thinking-section');
                    thinkingSection.classList.add('thinking-expanded');
                    toggleReasoningIcon();
                },
                hideReasoning: () => {
                    //const thinkingSection = bubble.querySelector('.thinking-section');
                    thinkingSection.classList.remove('thinking-expanded');
                    toggleReasoningIcon();
                },
                finishReasoning: () => {
                    //const thinkingSection = bubble.querySelector('.thinking-section');
                    thinkingSection.classList.remove('thinking-expanded');
                    thinkingSection.querySelector('.thinking-header span').textContent = '已深度思考';
                    toggleReasoningIcon();
                },
                updateReasoning: (text) => {
                    if (thinkingSection.classList.contains('thinking-hide')) {
                        thinkingSection.classList.remove('thinking-hide');
                    }
                    //const thinkingSection = bubble.querySelector('.thinking-section');
                    thinkingSection.querySelector('.thinking-header span').textContent = '思考中...';
                    thinkingSection.querySelector('.thinking-content').innerHTML = formatMessageContent(text);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    return
                },
                update: (text, error = false) => {
                    // 移除加载指示器（如果还在）
                    if (sender === 'assistant') {
                        const loading = bubble.querySelector('.assistant-loading');
                        if (loading) {
                            bubble.removeChild(loading);
                        }
                    }
                    // 更新文本内容
                    if (error) {
                        textElement.innerHTML = `<div class="response-error"><div class="response-error-title">API请求错误</div>
        <div class="response-error-content">
           `+ formatMessageContent(text) + `
        </div></div>`;
                    } else {
                        messageElement.dataset.content = text;
                        textElement.innerHTML = formatMessageContent(text);
                    }
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                },
                complete: (metaInfo) => {
                    // 移除加载指示器
                    if (textElement.nextElementSibling && textElement.nextElementSibling.className === 'assistant-loading') {
                        bubble.removeChild(textElement.nextElementSibling);
                    }

                    // 更新元数据
                    metaElement.textContent = metaInfo;
                }
            };
        }
        // 会话切换
        document.querySelectorAll('.character-item').forEach(item => {
            item.addEventListener('click', function () {
                document.querySelectorAll('.character-item').forEach(i => {
                    i.classList.remove('active');
                });
                this.classList.add('active');
                document.querySelector('.chat-header').textContent = this.querySelector('.character-title').textContent;
            });
        });

        // 终止响应函数
        function abortResponse() {
            if (currentAbortController) {
                currentAbortController.abort();
                currentAbortController = null;
            }
            isStreaming = false;

            // 更新UI
            stopBtn.style.display = 'none';
            sendBtn.style.display = 'flex';
        }

        function asyncFetchResponse(userInput = null, messageId = null) {
            isStreaming = true;
            // 更新UI
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'flex';
            if (userInput == null && messageId == null) {
                return;
            }
            let userMessageElement = null;
            const selectedModel = document.getElementById('model-select').value;
            (async () => {
                let streaming = null;
                try {
                    let full_response = '';
                    let isThinking = false;
                    let thinkingContent = '';
                    if (messageId == null && userInput !== null) {
                        userMessageElement = addMessageElement({ "content": userInput, "role": 'user' });
                        const reponse = await addMessage(currentSession.id, userInput);
                        userMessageElement.getMessageElement().dataset.id = reponse['id'];
                        messageId = reponse['id'];
                    }
                    streaming = addMessageElement({
                        "content": '',
                        "role": 'assistant',
                        "reasoning_content": null
                    });
                    // 获取深度思考按钮状态
                    const deepThinkingBtn = document.getElementById('deep-thinking-btn');
                    const isDeepThinking = deepThinkingBtn && deepThinkingBtn.classList.contains('active');

                    for await (const value of fetchResponse(currentSession.id, messageId, isDeepThinking)) {
                        if (!isStreaming)
                            break
                        if ('error' in value && value.error !== null) {
                            console.log('error:' + value.error);
                            streaming.update(value.error, true);
                            break;
                        }
                        if (('assistant_message_id' in value) && value.assistant_message_id !== null) {
                            streaming.updateMessageId(value['assistant_message_id']);
                            console.log('assistant_message_id:' + value['assistant_message_id']);
                            continue;
                        }
                        if (('reasoning_content' in value) && value.reasoning_content !== null) {
                            if (!isThinking) {
                                isThinking = true;
                                streaming.showReasoning();
                            }
                            if (isThinking) {
                                thinkingContent += value.reasoning_content;
                                streaming.updateReasoning(thinkingContent);
                            }
                            continue;
                        }

                        // 检测思考结束标签
                        if (isThinking) {
                            isThinking = false;
                            streaming.finishReasoning();
                        }
                        if ('content' in value && value.content !== null) {
                            full_response += value.content;
                            streaming.update(full_response);
                        }
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.error('Error:', e);
                        if (streaming != null)
                            streaming.update("响应生成被中断");
                    }
                } finally {
                    // 重置状态
                    abortResponse();
                }
            })();
        }

        messagesContainer.addEventListener('click', function (event) {
            const actionElement = event.target.closest('.message-action');
            // 处理按钮点击逻辑...  
            if (!actionElement) return;

            // 获取操作类型
            const action = actionElement.dataset.action;
            // 找到整个消息元素
            const messageElement = actionElement.closest('.message');
            if (!messageElement) return;

            // 获取消息内容
            const messageText = messageElement.dataset.content;
            const messageId = messageElement.dataset.id;

            // 根据操作类型执行不同动作
            if (action === 'fetch-response') {
                console.log('重答' + messageId + " " + messageText);
                asyncFetchResponse(null, messageId);
            } else if (action === 'delete') {
                // 替换为:
                PopupService.confirm('确认删除', '确定要删除这条消息吗？此操作不可撤销。', '确认删除', '取消')
                    .then((result) => {
                        if (result.isConfirmed) {
                            messageElement.remove();
                            deleteMessage(messageId);
                            PopupService.success('已删除!', '消息已成功删除。');
                        }
                    });
            } else if (action === 'edit') {
                PopupService.editMessage(messageText)
                    .then((result) => {
                        if (result.isConfirmed) {
                            const newContent = result.value;
                            // 更新UI显示
                            const messageTextElement = messageElement.querySelector('.message-text');
                            messageTextElement.innerHTML = formatMessageContent(newContent);
                            // 更新数据集中的内容
                            messageElement.dataset.content = newContent;
                            // 调用API更新后端消息记录
                            updateMessage(messageId, newContent)
                                .then(() => {
                                    console.log('消息更新成功');
                                })
                                .catch(error => {
                                    console.error('消息更新失败:', error);
                                    PopupService.error('错误', '消息更新失败，请重试。');
                                });
                        }
                    });
            } else if (action === 'copy') {
                navigator.clipboard.writeText(messageText).then(() => {
                    //  showNotification('消息已复制到剪贴板');
                });
            }
        });

        // 停止按钮事件
        stopBtn.addEventListener('click', abortResponse);

        sendBtn.addEventListener('click', function () {
            const message = messageInput.value.trim();
            if (message) {
                asyncFetchResponse(message);
                messageInput.value = '';
            }
        });

        // 输入框回车发送
        messageInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // 滑块值显示
        document.querySelectorAll('.slider').forEach(slider => {
            const valueDisplay = slider.nextElementSibling;
            valueDisplay.textContent = slider.value;

            slider.addEventListener('input', function () {
                valueDisplay.textContent = this.value;
            });
        });

        // fetchFullHistory().then(history => {
        //     history.forEach(msg => {
        //         addMessage(msg.content, msg.role);
        //     });
        // });

        // 在script标签中添加以下代码

        // 获取输入框元素
        const nameInput = document.getElementById('character-name');
        const setupInput = document.getElementById('character-setup');
        const styleInput = document.getElementById('character-style');
        const modelSelect = document.getElementById('model-select');
        const memoryTypeSelect = document.getElementById('memory-type-select');
        const clearChatBtn = document.querySelector('.clear-chat-btn');


        // 初始化函数
        async function asyncInitSessionConfig(sessionId) {
            try {
                cleanupMessages();
                const sessionConfig = await fetchSessionConfig(sessionId);

                const character = await fetchCharacter(sessionConfig['character_id']);

                // 更新UI输入框
                nameInput.value = character.name || '';
                setupInput.value = character.identity || '';
                styleInput.value = character.detailed_setting || '';

                modelSelect.value = sessionConfig.model || '';
                memoryTypeSelect.value = sessionConfig.memory_type || '';


                // 更新当前配置
                currentCharacter = {
                    id: character.id,
                    title: character.title || '',
                    name: character.name || '',
                    identity: character.identity || '',
                    detailed_setting: character.detailed_setting || '',
                    avatar_url: character.avatar_url || '',
                };

                currentSession = {
                    id: sessionConfig.id,
                    model: sessionConfig.model,
                    memory_type: sessionConfig.memory_type,
                }


                // 加载历史消息
                const messages = await fetchFullHistory(sessionId);
                messages.items.forEach(msg => {
                    addMessageElement(msg);
                });
                const avatarPreview = document.getElementById('avatar-preview');
                const avatarPlaceholder = document.getElementById('avatar-placeholder');

                if (currentCharacter.avatar_url != '') {
                    avatarPreview.src = currentCharacter.avatar_url;
                    avatarPreview.style.display = 'block';
                    avatarPlaceholder.style.display = 'none';
                } else {
                    avatarPreview.src = '';
                    avatarPreview.style.display = 'none';
                    avatarPlaceholder.style.display = 'flex';
                }
            } catch (error) {
                console.error('初始化角色配置失败:', error);
            }
        }
        // 角色
        async function switchCharacter(characterId) {
            try {   // 设置当前会话为活动状态

        async function asyncFetchCharacters() {
            try {
                const charactersList = document.querySelector('.characters-list');
                charactersList.innerHTML = ''; // 清空现有列表
                const characters = await fetchCharacters();
                characters.items.forEach(character => {
                    const item = document.createElement('div');
                    item.className = 'character-item';
                    item.dataset.id = character.id;

                    const avatar = character.avatar_url == '' ? '<i class="fas fa-user"></i>' : `<img src='${character.avatar_url}'>`;
                    item.innerHTML = `
                    <div class="character-avatar">
                        <div class="avatar-img">
                        ${avatar}
                        </div>
                    </div>
                    <div class="character-info">
                        <div class="character-title">${character.title}</div>
                    </div>
                    <div class="character-actions">
                        <button class="character-action-btn" data-action="rename" title="重命名"><i class="fas fa-edit"></i></button>
                        <button class="character-action-btn" data-action="delete" title="删除"><i class="fas fa-trash"></i></button>
                    </div>
                `;


                    // 添加点击事件
                    item.addEventListener('click', function () {
                        // 移除所有活动状态
                        document.querySelectorAll('.character-item').forEach(item => {
                            item.classList.remove('active');
                        });

                        this.classList.add('active');
                        document.getElementById('chat-title').textContent = character.name;

                        // 切换会话逻辑
                        switchCharacter(character.id);
                    });

                    item.querySelectorAll('.character-action-btn').forEach(btn => {
                        console.log(btn);
                        btn.addEventListener('click', async function (e) {
                            e.stopPropagation();
                            const action = btn.dataset.action;
                            console.log(action);
                            if (action === 'rename') {
                                const result = await PopupService.prompt("编辑角色标题", character.title, "请输入角色标题");

                                if (result.isConfirmed) {
                                    const newTitle = result.value;
                                    // 更新UI中的标题
                                    item.querySelector('.character-title').textContent = newTitle;

                                    // 更新当前配置并保存到后端
                                    character.title = newTitle;
                                    debouncedUpdateCharacter(character.id, character);
                                    // 使用toast提示而不是弹窗
                                    PopupService.toast('角色标题已更新', 'success');
                                }
                            }
                            if (action === 'delete') {
                                const result = await PopupService.confirm('确认删除', '确定要删除这个角色吗？此操作不可撤销。');
                                if (result.isConfirmed) {
                                    await deleteCharacter(character.id);
                                    item.remove();
                                    selectFirstCharacter();
                                    PopupService.toast('角色删除成功', 'success');
                                }
                            }
                        });
                    });
                    charactersList.appendChild(item);
                });
            } catch (error) {
                console.error('获取角色失败:', error);
            }
        }

        // 初始化头像上传功能
        function initAvatarUpload() {
            const avatarUpload = document.getElementById('avatar-upload');
            const selectAvatarBtn = document.getElementById('select-avatar-btn');
            const removeAvatarBtn = document.getElementById('remove-avatar-btn');

            // 点击选择图片按钮时触发文件选择
            selectAvatarBtn.addEventListener('click', () => {
                avatarUpload.click();
            });

            // 文件选择后处理
            avatarUpload.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    // 创建预览URL
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        // 显示裁剪模态框
                        showAvatarCropModal(event.target.result, file);
                    };
                    reader.readAsDataURL(file);
                }
            });

            // 移除头像
            removeAvatarBtn.addEventListener('click', () => {
                avatarPreview.src = '';
                avatarPreview.style.display = 'none';
                avatarPlaceholder.style.display = 'flex';
                removeAvatarBtn.style.display = 'none';
                avatarUpload.value = '';

                // 清除配置中的头像
                if (currentCharacter.id) {
                    // 发送空图像URL以清除头像
                    const updatedConfig = { ...currentCharacter, image: '' };
                    debouncedUpdateCharacter(currentCharacter.id, updatedConfig);
                }
            });
        }

        // 显示头像裁剪模态框
        function showAvatarCropModal(imageSrc, file) {
            // 创建模态框
            const modal = document.createElement('div');
            modal.className = 'avatar-crop-modal';
            modal.innerHTML = `
                <div class="avatar-crop-content">
                    <div class="avatar-crop-header">
                        <h3>裁剪头像</h3>
                        <button class="avatar-crop-close">&times;</button>
                    </div>
                    <div class="avatar-crop-body">
                        <img id="avatar-crop-image" src="${imageSrc}" alt="待裁剪图片">
                    </div>
                    <div class="avatar-crop-footer">
                        <button class="avatar-crop-cancel">取消</button>
                        <button class="avatar-crop-confirm">确认</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // 初始化裁剪器
            const image = document.getElementById('avatar-crop-image');
            const cropper = new Cropper(image, {
                aspectRatio: 1,
                viewMode: 1,
                movable: false,
                zoomable: false,
                rotatable: false,
                scalable: false,
                autoCropArea: 1
            });

            // 绑定事件
            const closeModal = () => {
                cropper.destroy();
                document.body.removeChild(modal);
            };

            modal.querySelector('.avatar-crop-close').addEventListener('click', closeModal);
            modal.querySelector('.avatar-crop-cancel').addEventListener('click', closeModal);

            modal.querySelector('.avatar-crop-confirm').addEventListener('click', () => {
                // 获取裁剪后的图像数据
                const canvas = cropper.getCroppedCanvas({
                    width: 200,
                    height: 200
                });

                canvas.toBlob(async (blob) => {
                    // 上传裁剪后的图像
                    const formData = new FormData();
                    formData.append('avatar', blob, 'avatar.png');

                    try {
                        const response = await fetch('/v1/characters/' + currentCharacter.id + '/avatars', {
                            method: 'POST',
                            body: formData
                        });

                        const result = await response.json();

                        if (result.success) {
                            // 更新预览
                            const avatarPreview = document.getElementById('avatar-preview');
                            const avatarPlaceholder = document.getElementById('avatar-placeholder');
                            const removeAvatarBtn = document.getElementById('remove-avatar-btn');
                            avatarPreview.src = '';
                            avatarPreview.src = result.data.url + "?" + (new Date());
                            avatarPreview.style.display = 'block';
                            avatarPlaceholder.style.display = 'none';
                            // removeAvatarBtn.style.display = 'inline-block';

                            // 保存到当前配置
                            if (currentCharacter.id) {
                                currentCharacter.id.avatar_url = result.data.url;
                                // const updatedConfig = { ...currentCharacter, image: result.data.url };
                                // debouncedUpdateCharacter(currentCharacter.id, updatedConfig);
                            }
                        } else {
                            PopupService.error('错误', result.error || '上传失败');
                        }
                    } catch (error) {
                        PopupService.error('错误', '上传失败: ' + error.message);
                    }

                    closeModal();
                }, 'image/png');
            });
        }
